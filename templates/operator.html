<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>עמדת מראיין-יום מיצוי</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d3436 0%, #544d3d 100%);
            min-height: 100vh;
            padding: 20px;
            direction: rtl;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }

        .header h1 {
            font-size: 42px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .main-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .station-info {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #556B2F;
        }

        .station-name {
            font-size: 24px;
            color: #2d3436;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .operator-name {
            font-size: 14px;
            color: #666;
        }

        .display-section {
            background: linear-gradient(135deg, #556B2F 0%, #6B8E23 100%);
            color: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }

        .display-label {
            font-size: 16px;
            text-transform: uppercase;
            opacity: 0.9;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .current-number {
            font-size: 80px;
            font-weight: bold;
            line-height: 1;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);
        }

        .no-customer {
            font-size: 20px;
            opacity: 0.8;
        }

        .queue-info {
            text-align: center;
            padding: 15px;
            background: #f0f8ff;
            border-radius: 8px;
            margin-bottom: 25px;
            color: #333;
            font-size: 14px;
            border-right: 3px solid #556B2F;
        }

        .buttons-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-primary {
            background: #4a7c59;
            color: white;
            grid-column: 1 / -1;
            font-size: 16px;
            padding: 16px;
        }

        .btn-primary:hover {
            background: #2d5f3f;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: #8B4513;
            color: white;
        }

        .btn-secondary:hover {
            background: #6B3410;
            transform: translateY(-2px);
        }

        .btn-release {
            background: #88ae46;
            color: white;
        }

        .btn-release:hover {
            background: #3bb359;
            transform: translateY(-2px);
        }
        .btn-poked {
            background: #8B0000;
            color: white;
        }

        .btn-poked:hover {
            background: #a00000;
            transform: translateY(-2px);
        }
        .message {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            text-align: center;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 15px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease;
        }

        @keyframes modalSlideIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            text-align: center;
            margin-bottom: 25px;

            color: #2d3436;
            font-size: 22px;
            margin-bottom: 5px;
        }

            color: #666;
            font-size: 13px;
        }

            margin-bottom: 20px;
        }

            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 13px;
        }

        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:focus {
            outline: none;
            border-color: #556B2F;
            box-shadow: 0 0 0 3px rgba(85, 107, 47, 0.1);
        }

        .modal-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;

            margin-top: 20px;

        .modal-btn {
            padding: 11px;

            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
        }

        .modal-btn-submit {
            background: #4a7c59;
            color: white;
        }

        .modal-btn-submit:hover {
            background: #2d5f3f;
        }

        .modal-btn-cancel {
            background: #f5f5f5;
            color: #333;
            border: 1px solid #e0e0e0;
        }

        .modal-btn-cancel:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            display: none;
            margin: 15px 0;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #556B2F;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading p {
            color: #556B2F;
            font-weight: 600;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .main-card {
                padding: 25px;
            }

                font-size: 32px;
            }

            .current-number {
                font-size: 56px;
            }

            .buttons-group {
                grid-template-columns: 1fr;
            }

            .btn-primary {
                grid-column: 1 / -1;
            }

            .modal-content {
                padding: 25px;
            }

        let stationId = null;

        function showMessage(text, type) {
    const messageDiv = document.getElementById('message');
    messageDiv.textContent = text;
    messageDiv.className = `message ${type}`;
    
    // הסתר את ההודעה אחרי 4 שניות
    setTimeout(() => {
        messageDiv.className = 'message';
    }, 4000);
}

        // קבל את הקוד מה-URL
        function getOperatorCode() {
            const params = new URLSearchParams(window.location.search);
            return params.get('code');
        }

        // קבל את ה-stationId מה-path
function getStationId() {
    const path = window.location.pathname;
    const parts = path.split('/');
    const stationId = parts[parts.length - 1];
    console.log('Extracted station ID from path:', stationId);
    return parseInt(stationId) || 1;
}







        // טוען נתונים בהתחלה
        async function init() {
            stationId = getStationId();
            operatorCode = getOperatorCode();

            if (!operatorCode) {
                window.location.href = '/operator';
                return;
            }

            await loadStationInfo();
            await loadTransferStations();
            await updateDisplay();

            // עדכון כל 2 שניות
            setInterval(updateDisplay, 2000);
        }

            try {

                //const stations = await response.json();
                //const station = stations.find(s => s.id == stationId);

                const response = await fetch('/api/center-data');
                const stations = await response.json();
                const station = stations.find(s => s.id == stationId);


                if (station) {
                    document.getElementById('stationName').textContent = station.name;
                    document.getElementById('stationDisplay').textContent = station.name;

                    if (station.is_routing) {
                        console.log('✅ IS ROUTING - נכנס לפה!');
                        document.getElementById('toggleBtn').style.display = 'none';
                        const buttonsGroup = document.querySelector('.buttons-group');
                     
                        const transferPokedBtn = document.createElement('button');
                        transferPokedBtn.className = 'btn-poked';
                        transferPokedBtn.textContent = '🔴 העברה לפוקד';
                        transferPokedBtn.onclick = transferToPoked;
                        buttonsGroup.appendChild(transferPokedBtn);
                         const searchBtn = document.createElement('button');
                        searchBtn.className = 'btn-secondary';
                        searchBtn.textContent = '🔍 חפש מועמד';
                        searchBtn.onclick = openSearchModal;
                        searchBtn.style.background = '#003366';  // כחול כהה
                        //buttonsGroup.insertBefore(searchBtn, document.querySelector('.btn-release'));
                        buttonsGroup.appendChild(searchBtn);
                    } else if (station.queue_group_id === 'og') {
                    // תחנות 96 - הוסף רק כפתור העברה לתחנות מוגבלות
                    const buttonsGroup = document.querySelector('.buttons-group');
                    
                    const transferRestrictedBtn = document.createElement('button');
                    transferRestrictedBtn.className = 'btn-poked';
                    transferRestrictedBtn.textContent = '📋 העברה לעמדות האוגדה';
                    transferRestrictedBtn.onclick = openRestrictedTransferModal;
                    buttonsGroup.appendChild(transferRestrictedBtn);

                   



                    } else {
                        console.log('❌ NOT ROUTING - נכנס לפה!');
                        document.getElementById('toggleBtn').style.display = 'block';
                    }

    
                }
            } catch (error) {
                console.error('Error loading station info:', error);
            }
        }

        // טוען רשימת תחנות להעברה
        async function loadTransferStations() {
            try {
                const response = await fetch('/api/stations-list');
                const stations = await response.json();

                const select = document.getElementById('transferStation');
                select.innerHTML = stations
                    .filter(s => s.id != stationId)
                    .map(s => `<option value="${s.id}">${s.name}</option>`)
                    .join('');
            } catch (error) {
                console.error('Error loading stations:', error);
            }
        }

        // עדכון מסך התצוגה
        async function updateDisplay() {
            try {
               // const response = await fetch('/api/center-data');
               //const stations = await response.json();

                const response = await fetch(`/api/operator-data/${STATION_ID}`);
                const station = await response.json();
                //const station = stations.find(s => s.id == stationId);

             

                if (station) {
                    // עדכן את המספר הנוכחי
                    if (station.current_number) {
                        document.getElementById('currentNumber').textContent = station.current_number;
                        currentCustomer = station.current_number;
                    } else {
                        document.getElementById('currentNumber').innerHTML = '<span class="no-customer">אין בשירות</span>';
                        currentCustomer = null;
                    }

                    // עדכן כפתור SMS
                    const smsBtn = document.getElementById('smsBtn');
                    if (station.has_phone && station.current_number && station.manual_sms_enabled) {
                        smsBtn.style.display = 'block';
                        smsBtn.disabled = false;
                        smsBtn.textContent = '📱 שלח SMS';
                    } else {
                        smsBtn.style.display = 'none';
                    }

                    // עדכן את מספר הממתינים
                    const waitingCount = station.waiting_list ? station.waiting_list.length : 0;
                    document.getElementById('waitingCount').textContent = waitingCount;
                }
            } catch (error) {
                console.error('Error updating display:', error);
            }
        }

        // פתח modal להעברה
        function openTransferModal() {
            if (!currentCustomer) {
                showMessage('⚠️ אין מועמד בשירות כרגע', 'error');
                return;
            }

            document.getElementById('modalCustomerInfo').textContent = `העברת מועמד ${currentCustomer}`;
            document.getElementById('transferModal').classList.add('active');
        }

        // סגור modal
        function closeTransferModal() {
            document.getElementById('transferModal').classList.remove('active');

        // אישור העברה
async function callNext() {
    // בדיקה 1: האם יש מועמד בשירות כרגע
    if (currentCustomer) {
        showMessage(`⚠️ יש מועמד בשירות (${currentCustomer})! יש לסיים עם המועמד הנוכחי לפני קריאה לבא`, 'error');
        return;
    }

    // בדיקה 2: האם כבר יש קריאה בתהליך
    if (isCallInProgress) {
        showMessage('⏳ אנא המתן, הקריאה בתהליך...', 'error');
        return;
    }

    if (!operatorCode) {
        showMessage('❌ לא נמצא קוד מראיין', 'error');
        return;
    }

    // נעילת הכפתור ומשתנה
    isCallInProgress = true;
    document.getElementById('loading').style.display = 'block';
    document.getElementById('callNextBtn').disabled = true;

    try {
        const response = await fetch(`/api/call-next/${STATION_ID}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                operator_code: operatorCode
            })
        });

        const data = await response.json();

        if (response.ok) {
            showMessage(`✅ מועמד ${data.customer_number} נקרא`, 'success');
            await updateDisplay();
        } else {
            showMessage(`❌ ${data.error || 'לא יכול לקרוא הבא'}`, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ שגיאה בקריאה', 'error');
    } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('callNextBtn').disabled = false;
        isCallInProgress = false;
    }
}


       
       
async function confirmTransfer() {
    if (!currentCustomer) {
        showMessage('❌ אין מועמד בשירות', 'error');
        return;
    }

    const targetStationId = document.getElementById('transferStation').value;
    if (!targetStationId) {
        showMessage('❌ בחר תחנה', 'error');
        return;
    }

    document.getElementById('transferLoading').style.display = 'block';

    try {
        const response = await fetch('/api/add-entry', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                station_id: parseInt(targetStationId),
                customer_number: currentCustomer,
                transfer: true
            })
        });

        const data = await response.json();

        if (response.ok) {
            // סגור את המודל קודם
            closeTransferModal();
            
            // הצג הודעת הצלחה
            showMessage(`✅ מועמד ${currentCustomer} הועבר בהצלחה!`, 'success');
            
            // עדכן את התצוגה
            await updateDisplay();
        } else {
            showMessage(`❌ ${data.error}`, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ שגיאה בהעברה', 'error');
    } finally {
        document.getElementById('transferLoading').style.display = 'none';
    }
}




        // העברה לעמדת שחרור
        async function finishCustomer() {
    if (!currentCustomer) {
        showMessage('⚠️ אין מועמד בשירות כרגע', 'error');
        return;
    }

    // בקשה לאישור
    if (!confirm(`האם אתה בטוח שאתה רוצה לסיים עם המועמד ${currentCustomer} מהמערכת?`)) {
        return;
    }

    document.getElementById('loading').style.display = 'block';

    try {
        const response = await fetch('/api/finish-customer', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                customer_number: currentCustomer
            })
        });

        const data = await response.json();

        if (response.ok) {
            showMessage(`✅ ${data.message}`, 'success');
            currentCustomer = null;
            await updateDisplay();
        } else {
            showMessage(`❌ ${data.error}`, 'error');
        }
    } catch (error) {
        console.error('Error:', error);

async function loginOperator() {
    const code = document.getElementById('operatorCode').value;
    
    if (!code) {
        showLoginError('⚠️ הקלד קוד עובד');
        return;
    }
    
    // בדוק אם הקוד תקין (  עד 8 4 ספרות)
    
    if (!/^\d{4,8}$/.test(code)) {
    showLoginError('❌ קוד חייב להיות 4-8 ספרות');
    return;
    }
    
    try {
        const response = await fetch('/api/get-operator-station', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ operator_code: code })
        });
        
        const data = await response.json();
        
        if (data.success) {
            // הפנה ל-/operator/{station_id} עם הקוד בURL
            window.location.href = `/operator/${data.station_id}?code=${code}`;
        } else {
            showLoginError('❌ קוד מראיין לא תקין!');
        }
    } catch (error) {
        console.error('Error:', error);
        showLoginError('❌ שגיאה בהזדהות');
    }
}

}

async function toggleStationStatus() {
    if (!operatorCode) {
        showMessage('❌ Operator code not found', 'error');
        return;
    }

    const btn = document.getElementById('toggleBtn');
    const originalText = btn.textContent;
    
    // הצג loading state
    btn.disabled = true;
    btn.textContent = '⏳ Loading...';
    document.getElementById('loading').style.display = 'block';

    try {
        const response = await fetch(`/api/toggle-station-status/${STATION_ID}`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                operator_code: operatorCode
            })
        });

        const data = await response.json();

        if (response.ok) {
            // עדכן את הכפתור מיידית
            updateToggleButton(data.is_active);
            
            showMessage(`✅ ${data.message}`, 'success');
            await updateDisplay();
        } else {
            showMessage(`❌ ${data.error}`, 'error');
            btn.textContent = originalText;
        }
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ Error changing status', 'error');
        btn.textContent = originalText;
    } finally {
        document.getElementById('loading').style.display = 'none';
        btn.disabled = false;
    }
}

function updateToggleButton(isActive) {
    const btn = document.getElementById('toggleBtn');
    if (isActive) {
        btn.textContent = '🟢 Station Active';
        btn.classList.remove('inactive');
        btn.style.background = '#4a7c59';
    } else {
        btn.textContent = '🔴 Station Inactive';
        btn.classList.add('inactive');
        btn.style.background = '#FF8C00';
    }
}

function openSearchModal() {
    document.getElementById('searchModal').classList.add('active');
    document.getElementById('searchNumber').focus();
    clearSearch();
}

function closeSearchModal() {
    document.getElementById('searchModal').classList.remove('active');
    clearSearch();
}

function clearSearch() {
    document.getElementById('searchNumber').value = '';
    document.getElementById('searchMessage').style.display = 'none';
    document.getElementById('searchResults').style.display = 'none';
    document.getElementById('historyList').innerHTML = '';
}

async function performSearch() {
    const customerNumber = document.getElementById('searchNumber').value;
    
    if (!customerNumber) {
        showSearchError('⚠️ הקלד מספר סידורי');
        return;
    }

    document.getElementById('searchLoading').style.display = 'block';
    document.getElementById('searchMessage').style.display = 'none';
    document.getElementById('searchResults').style.display = 'none';

    try {
        const response = await fetch(`/api/search-customer?number=${customerNumber}`);
        const history = await response.json();

        if (!response.ok || history.length === 0) {
            showSearchError(`❌ מועמד ${customerNumber} לא נמצא`);
            return;
        }

        displaySearchResults(history, customerNumber);

    } catch (error) {
        console.error('Error:', error);
        showSearchError('❌ שגיאה בחיפוש');
    } finally {
        document.getElementById('searchLoading').style.display = 'none';
    }
}

function displaySearchResults(history, customerNumber) {
    const resultsDiv = document.getElementById('searchResults');
    const historyList = document.getElementById('historyList');
    const messageDiv = document.getElementById('searchMessage');

    messageDiv.innerHTML = `✅ מועמד ${customerNumber} נמצא`;
    messageDiv.className = 'success';
    messageDiv.style.display = 'block';
    messageDiv.style.background = '#d4edda';
    messageDiv.style.color = '#155724';
    messageDiv.style.border = '2px solid #c3e6cb';

    if (history.length === 0) {
        historyList.innerHTML = '<p style="color: #666; text-align: center;">אין היסטוריה</p>';
    } else {
        historyList.innerHTML = history.map(h => `
            <div style="padding: 10px; background: white; margin: 8px 0; border-radius: 6px; border-right: 3px solid #556B2F;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <strong style="color: #2d3436; font-size: 14px;">${h.station_name}</strong>
                        <div style="color: #556B2F; font-size: 12px; margin-top: 3px;">${h.status}</div>
                    </div>
                    <div style="color: #999; font-size: 11px;">
                        ${new Date(h.created_at).toLocaleTimeString('he-IL')}
                    </div>
                </div>
            </div>
        `).join('');
    }

    resultsDiv.style.display = 'block';
}

function showSearchError(message) {
    const messageDiv = document.getElementById('searchMessage');
    messageDiv.innerHTML = message;
    messageDiv.className = 'error';
    messageDiv.style.display = 'block';
    messageDiv.style.background = '#f8d7da';
    messageDiv.style.color = '#721c24';
    messageDiv.style.border = '2px solid #f5c6cb';
    document.getElementById('searchResults').style.display = 'none';
}

async function loadQueueList() {
    const queueList = document.getElementById('queueList');
    const queueInfo = document.getElementById('queueModalInfo');
    
    queueList.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">טוען...</div>';
    
    try {
        const response = await fetch(`/api/station-queue/${STATION_ID}`);
        const data = await response.json();
        
        if (!response.ok || !data.queue || data.queue.length === 0) {
            queueInfo.textContent = 'אין ממתינים בתור';
            queueList.innerHTML = '<div style="text-align: center; padding: 30px; color: #999;">🎉 התור ריק!</div>';
            return;
        }
        
        queueInfo.textContent = `${data.count} ממתינים בתור`;
        
        queueList.innerHTML = data.queue.map((item, index) => `
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: ${index === 0 ? '#e8f5e9' : '#f9f9f9'}; margin-bottom: 8px; border-radius: 8px; border-right: 4px solid ${index === 0 ? '#4CAF50' : '#556B2F'};">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <span style="background: #556B2F; color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold;">${item.position}</span>
                    <span style="font-size: 18px; font-weight: 600; color: #2d3436;">${item.customer_number}</span>
                </div>
                <span style="font-size: 12px; color: #666;">${index === 0 ? '🔜 הבא בתור' : ''}</span>
            </div>
        `).join('');
        
    } catch (error) {
        console.error('Error:', error);
        queueList.innerHTML = '<div style="text-align: center; padding: 20px; color: #dc3545;">❌ שגיאה בטעינה</div>';
    }
}

async function openRestrictedTransferModal() {
    if (!currentCustomer) {
        showMessage('⚠️ אין מועמד בשירות כרגע', 'error');
        return;
    }
    
    document.getElementById('restrictedModalInfo').textContent = `העברת מועמד ${currentCustomer} לתחנה פנימית`;
    document.getElementById('restrictedTransferModal').classList.add('active');
    
    // טען את התחנות המוגבלות
    await loadRestrictedStations();
}

function closeRestrictedTransferModal() {
    document.getElementById('restrictedTransferModal').classList.remove('active');
}

async function loadRestrictedStations() {
    try {
        const response = await fetch('/api/restricted-stations');
        const stations = await response.json();
        
        const select = document.getElementById('restrictedStation');
        select.innerHTML = stations.map(s => 
            `<option value="${s.id}">${s.name}</option>`
        ).join('');
    } catch (error) {
        console.error('Error loading restricted stations:', error);
    }
}

async function confirmRestrictedTransfer() {
    if (!currentCustomer) {
        showMessage('❌ אין מועמד בשירות', 'error');
        return;
    }

    const targetStationId = document.getElementById('restrictedStation').value;
    if (!targetStationId) {
        showMessage('❌ בחר תחנה', 'error');
        return;
    }

    document.getElementById('restrictedTransferLoading').style.display = 'block';

    try {
        const response = await fetch('/api/add-entry', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                station_id: parseInt(targetStationId),
                customer_number: currentCustomer,
                transfer: true
            })
        });

        const data = await response.json();

        if (response.ok) {
            closeRestrictedTransferModal();
            showMessage(`✅ מועמד ${currentCustomer} הועבר לתחנה פנימית בהצלחה!`, 'success');
            currentCustomer = null;
            await updateDisplay();
        } else {
            showMessage(`❌ ${data.error}`, 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showMessage('❌ שגיאה בהעברה', 'error');
    } finally {
        document.getElementById('restrictedTransferLoading').style.display = 'none';
    }
}

document.addEventListener('click', (e) => {
    const restrictedModal = document.getElementById('restrictedTransferModal');
    if (e.target === restrictedModal) {

    }
